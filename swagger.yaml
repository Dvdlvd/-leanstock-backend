openapi: 3.0.0
info:
  title: LeanStock API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: test@test.com
                password:
                  type: string
                  example: 12345678
      responses:
        200:
          description: User created

  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: test@test.com
                password:
                  type: string
                  example: 12345678
      responses:
        200:
          description: Tokens returned

  /products:
    get:
      summary: Get all products
      security:
        - bearerAuth: []
      responses:
        200:
          description: OK

    post:
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Milk
                price:
                  type: number
                  example: 100
      responses:
        200:
          description: Created

  /locations:
    get:
      summary: Get all locations
      security:
        - bearerAuth: []
      responses:
        200:
          description: OK

    post:
      summary: Create location
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Warehouse A
      responses:
        200:
          description: Created

  /inventory/transfer:
    post:
      summary: Transfer inventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                fromLocationId:
                  type: string
                toLocationId:
                  type: string
                quantity:
                  type: number
                  example: 1
      responses:
        200:
          description: Transfer success