openapi: 3.0.0

info:
  title: LeanStock API
  version: 1.0.0
  description: Inventory management backend API

servers:
  - url: http://localhost:3000

paths:

  /auth/register:
    post:
      summary: Register user

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                email:
                  type: string

                password:
                  type: string

                role:
                  type: string

      responses:
        "200":
          description: User registered


  /auth/login:
    post:
      summary: Login user

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                email:
                  type: string

                password:
                  type: string

      responses:
        "200":
          description: Login success


  /auth/refresh:
    post:
      summary: Refresh access token

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                refreshToken:
                  type: string

      responses:
        "200":
          description: Token refreshed


  /auth/logout:
    post:
      summary: Logout user

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                refreshToken:
                  type: string

      responses:
        "200":
          description: Logged out


  /auth/verify/{token}:
    get:
      summary: Verify email

      parameters:
        - in: path
          name: token
          required: true

          schema:
            type: string

      responses:
        "200":
          description: Email verified


  /auth/forgot-password:
    post:
      summary: Request password reset

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                email:
                  type: string

      responses:
        "200":
          description: Reset email sent


  /auth/reset/{token}:
    post:
      summary: Reset password

      parameters:
        - in: path
          name: token
          required: true

          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                password:
                  type: string

      responses:
        "200":
          description: Password updated


  /products:
    get:
      summary: Get all products

      security:
        - bearerAuth: []

      responses:
        "200":
          description: Products list

    post:
      summary: Create product

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                name:
                  type: string

                sku:
                  type: string

                price:
                  type: number

                quantity:
                  type: integer

      responses:
        "200":
          description: Product created


  /products/{id}:

    get:
      summary: Get one product

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      responses:
        "200":
          description: Product found


    put:
      summary: Update product

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                name:
                  type: string

                price:
                  type: number

                quantity:
                  type: integer

      responses:
        "200":
          description: Product updated


    delete:
      summary: Delete product

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      responses:
        "200":
          description: Product deleted


  /products/{id}/reserve:

    post:
      summary: Reserve product

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                quantity:
                  type: integer

      responses:
        "200":
          description: Product reserved


  /products/{id}/forecast:

    get:
      summary: Product demand forecast

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      responses:
        "200":
          description: Forecast generated


  /inventory:

    post:
      summary: Create inventory for location

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                productId:
                  type: string

                locationId:
                  type: string

                quantity:
                  type: integer

      responses:
        "200":
          description: Inventory created


  /inventory/transfer:

    post:
      summary: Transfer inventory between locations

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                productId:
                  type: string

                fromLocationId:
                  type: string

                toLocationId:
                  type: string

                quantity:
                  type: integer

      responses:
        "200":
          description: Inventory transferred


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT